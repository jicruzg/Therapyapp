<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Centro de Terapia Conductual Contextual</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body style="margin:0;background:#4f46e5">
    <noscript style="display:block;color:white;font-size:20px;padding:40px;font-family:sans-serif">JavaScript está desactivado. Por favor actívalo para usar esta aplicación.</noscript>
    <script>
      document.body.style.background = 'green';
      window.addEventListener('error', function(e) {
        document.body.style.background = 'red';
        document.body.innerHTML = '<pre style="color:white;padding:40px;font-family:monospace;font-size:14px;white-space:pre-wrap">JS ERROR:\n' + e.message + '\nfile: ' + e.filename + '\nline: ' + e.lineno + '\n' + (e.error ? e.error.stack : '') + '</pre>';
      }, true);
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
